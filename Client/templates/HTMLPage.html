<HTML>
<HEAD>
<META NAME="GENERATOR" Content="Microsoft Visual Studio">
<TITLE></TITLE>
</HEAD>
<BODY>
    <h1>Airplane Warranty and Maintenance system</h1>
    <button onclick="connectToServer()">Connect to TCP Server</button>
    <p id="output"></p>

    <div id="main">
        <h2>Airplane Fleet Overview</h2>
        <p id="airplaneList">Connecting to system...</p>

        <div id="airplaneContainer" class="airplane-grid"></div>
    </div>

    <script>
        //function to connect to server via TCP
        async function connectToServer() {
            const output = document.getElementById("output");
            output.innerText = "Status: Initializing Handshake...";
            output.style.color = "orange";
  
            const res = await fetch("http://localhost:8080/connect-to-tcp-server");

            if (res.ok) {
                output.innerText = "Status: Connected to TCP Server";
                output.style.color = "green";

                console.log("Handshake successful. Fetching airplane database...");
                await loadAirplanes();
            } else {
                output.innerText = "Status: Handshake Failed - Unexpected Response";
                output.style.color = "red";
            }
            
        }

        // function to load airplane data from server and display it on the page
        async function loadAirplanes() {
            const container = document.getElementById("airplaneContainer"); 
            const output2 = document.getElementById("airplaneList");
            try {
                const res = await fetch("http://localhost:8080/airplanes"); 
                container.innerHTML = ""; // Clear loader
                if (!res.ok) {
                    throw new Error(`Server responded with status ${res.status}`);
                }

                const result = await res.json();
                const airplanes = result.data;

                airplanes.forEach(plane => {
                    const card = `
                        <div class="card">
                            <h3>${plane.name || 'Unknown Model'}</h3>
                            <p><span class="label">ID:</span> ${plane.airplaneid}</p>
                            <p><span class="label">Manufacturer:</span> ${plane.manufacturer || 'N/A'}</p>
                            <p><span class="label">Engines:</span> ${plane.engines || 0}</p>
                            <p><span class="label">Range:</span> ${plane.rangekm || 'Never'}</p>
                            <p><span class="label">Cargo Capacity (Kg):</span> ${plane.cargocapacitykg || 'Active'}</p>
                            <p><span class="label">Fuel Capacity (L) Exp:</span> ${plane.fuelcapacityl || 'N/A'}</p>
                            <p><span class="label">Airplane Length (m):</span> ${plane.airplanelengthm || 'N/A'}</p>
                            <p><span class="label">Wing Span (m):</span> ${plane.wingspanm || 'N/A'}</p>
                             
                            <div class="card-actions">
                                <button class="action-link" onclick="handleMaintenanceEvent('${plane.airplaneid}')">Maintenance Event</button>
                                <button class="action-link" onclick="handleMaintenanceHistory('${plane.airplaneid}')">Maintenance History</button>
                                <button class="action-link" onclick="handleWarrantyHistory('${plane.airplaneid}')">Warranty History</button>
                                <button class="action-link" onclick="handleWarrantyEvent('${plane.airplaneid}')">Warranty Event</button>
                            </div>
                        </div>
                    `;
                    container.innerHTML += card;
                });

                output2.innerText = '';
            } catch (error) {
                output2.innerText = "Error: " + error;
                output2.style.color = "red";
            }
        }

        function handleMaintenanceEvent(id) {
            console.log("Maintenance Event for:", id);
        }

        function handleMaintenanceHistory(id) {
            console.log("Maintenance History for:", id);
        }

        function handleWarrantyHistory(id) {
            console.log("Warranty History for:", id);
        }

        function handleWarrantyEvent(id) {
            console.log("Warranty Event for:", id);
        }
    </script>

    
    <style>
        /*CSS for styling the airplane cards and grid layout*/
        .airplane-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 20px;
            padding: 20px;
        }

        .card {
            border: 1px solid #ddd;
            border-radius: 8px;
            padding: 15px;
            background-color: #f9f9f9;
            box-shadow: 2px 2px 5px rgba(0,0,0,0.1);
        }

            .card h3 {
                margin-top: 0;
                color: #0056b3;
            }

            .card p {
                margin: 5px 0;
                font-size: 0.9em;
            }

        .label {
            font-weight: bold;
            color: #555;
        }

        .card-actions {
            display: flex;
            flex-wrap: wrap; /* Allows wrapping on small screens */
            gap: 8px;
            margin-top: 15px;
            padding-top: 10px;
            border-top: 1px solid #eee; /* Light line to separate from data */
        }

        .action-link {
            background: none;
            border: none;
            padding: 0;
            color: #0056b3;
            font-size: 0.85em;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
        }

            .action-link:hover {
                text-decoration: underline;
                color: #003d80;
            }

            .action-link:not(:last-child)::after {
                content: "||";
                margin-left: 8px;
                color: #ccc; /* Lighter color for the bar so it's not distracting */
                cursor: default;
                text-decoration: none;
                display: inline-block;
            }
    </style>

</BODY>
</HTML>
