<HTML>
<HEAD>
<META NAME="GENERATOR" Content="Microsoft Visual Studio">
<TITLE></TITLE>
</HEAD>
<BODY>
    <h1>Airplane Warranty and Maintenance system</h1>
    <button onclick="connectToServer()">Connect to TCP Server</button>
    <p id="output"></p>

    <div id="main">
        <h2>Airplane Fleet Overview</h2>
        <p id="airplaneList">Connecting to system...</p>

        <div id="airplaneContainer" class="airplane-grid"></div>
    </div>

    <dialog id="statusModal">
        <p id="modalMessage"></p>
        <button id="closeBtn">OK</button>
    </dialog>

    <script>
        //function to connect to server via TCP
        async function connectToServer() {
            const output = document.getElementById("output");
            output.innerText = "Status: Initializing Handshake...";
            output.style.color = "orange";

            const res = await fetch("http://localhost:8080/connect-to-tcp-server");

            if (res.ok) {
                output.innerText = "Status: Connected to TCP Server";
                output.style.color = "green";

                console.log("Handshake successful. Fetching airplane database...");
                await loadAirplanes();
            } else {
                output.innerText = "Status: Handshake Failed - Unexpected Response";
                output.style.color = "red";
            }

        }

        // function to load airplane data from server and display it on the page
        async function loadAirplanes() {
            const container = document.getElementById("airplaneContainer");
            const output2 = document.getElementById("airplaneList");
            try {
                const res = await fetch("http://localhost:8080/airplanes");
                container.innerHTML = ""; // Clear loader
                if (!res.ok) {
                    throw new Error(`Server responded with status ${res.status}`);
                }

                const result = await res.json();
                const airplanes = result.data;

                airplanes.forEach(plane => {
                    const card = `
                            <div class="card">
                                <h3>${plane.name || 'Unknown Model'}</h3>
                                <p><span class="label">ID:</span> ${plane.airplaneid}</p>
                                <p><span class="label">Manufacturer:</span> ${plane.manufacturer || 'N/A'}</p>
                                <p><span class="label">Engines:</span> ${plane.engines || 0}</p>
                                <p><span class="label">Range:</span> ${plane.rangekm || 'Never'}</p>
                                <p><span class="label">Cargo Capacity (Kg):</span> ${plane.cargocapacitykg || 'Active'}</p>
                                <p><span class="label">Fuel Capacity (L) Exp:</span> ${plane.fuelcapacityl || 'N/A'}</p>
                                <p><span class="label">Airplane Length (m):</span> ${plane.airplanelengthm || 'N/A'}</p>
                                <p><span class="label">Wing Span (m):</span> ${plane.wingspanm || 'N/A'}</p>

                                <div class="card-actions">
                                    <button class="action-link" onclick="handleMaintenanceEvent('${plane.airplaneid}', '${plane.name}')">Maintenance Event</button>
                                    <button class="action-link" onclick="handleMaintenanceHistory('${plane.airplaneid}', '${plane.name}')">Maintenance History</button>
                                    <button class="action-link" onclick="handleWarrantyHistory('${plane.airplaneid}', '${plane.name}')">Warranty History</button>
                                    <button class="action-link" onclick="handleWarrantyEvent('${plane.airplaneid}', '${plane.name}')">Warranty Event</button>
                                </div>
                            </div>
                        `;
                    container.innerHTML += card;
                });

                output2.innerText = '';
            } catch (error) {
                output2.innerText = "Error: " + error;
                output2.style.color = "red";
            }
        }

        //maintenance event handler function 
        async function handleMaintenanceEvent(id, name) {
            console.log("Maintenance Event for:", id + " " + name);
            const container = document.getElementById("main");
            const form = `
                    <h2>Maintenance Event for Airplane ${name}</h2>
                    <form id="maintenanceForm">
                    <label for="eventType">Maintenance Event Type:</label><br>
                    <select id="eventType" required>
                        <option value="">Select a type</option>
                        <option value="Inspection">Inspection</option>
                        <option value="Repair">Repair</option>
                        <option value="Oil Change">Oil Change</option>
                    </select><br><br>
                        <label for="description">Description:</label><br>
                        <textarea id="description" placeholder="Description" required></textarea><br><br>
                    <div style="display: flex; gap: 15px;">
                        <button type="submit">Submit Maintenance Event</button> 
                        <button onclick="MainPage()">Back to Airplane List</button>
                    </div>
                    </form>
                `;
            container.innerHTML = form;

            document.getElementById('maintenanceForm').addEventListener('submit', async (e) => {
                e.preventDefault();

                const eventData = {
                    airplaneID: id,
                    technicianID: "1",
                    eventType: document.getElementById('eventType').value,
                    description: document.getElementById('description').value
                };
                try {
                    const response = await fetch('http://localhost:8080/maintenance_event', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(eventData)
                    });

                    const result = await response.text();

                    const modal = document.getElementById('statusModal');
                    const msg = document.getElementById('modalMessage');
                    const btn = document.getElementById('closeBtn');

                    msg.textContent = result;
                    modal.showModal();
                    btn.onclick = () => {
                        modal.close();
                        container.innerHTML = "";
                        MainPage(); // Reset main container content and reload airplane list after submitting the maintenance event
                    };

                } catch (err) {
                    console.error("Fetch error:", err);
                }
            });
        }

        function MainPage() {
            const container = document.getElementById("main");
            const page1 = ` <h2>Airplane Fleet Overview</h2>
                            <p id="airplaneList">Connecting to system...</p>
                            <div id="airplaneContainer" class="airplane-grid"></div>`;
            container.innerHTML = page1;
            loadAirplanes();
        }

        //maintenance history event handler 
        async function handleMaintenanceHistory(id, name) {
            console.log("Maintenance History for:", id);
            const container = document.getElementById("main");
            const response = await fetch(`http://localhost:8080/maintenance_history/${id}`);
            const data = await response.json();
            container.innerHTML = `<h2>Maintenance History for Airplane ${name}</h2>`;

            data.forEach(mh => {
                const historyContent = `
                    <div class="card">
                        <p><span class="label">Maintenance Type:</span> ${mh.type}</p>
                        <p><span class="label">Damage Description:</span> ${mh.description}</p>
                        <button onclick="MainPage()">Back to Airplane List</button>
                    </div>
                `;
                container.innerHTML += historyContent;
            });
            
        }

        //warranty history event handler
        async function handleWarrantyHistory(id, name) {
            console.log("Warranty History for:", id);
            const container = document.getElementById("main");
            const response = await fetch(`http://localhost:8080/warranty_history/${id}`);
            const data = await response.json();

            const historyContent = `
                            <h2>Request Warranty History for Airplane ${name}</h2>
                            <div class="card">
                                <p><span class="label">Warranty Status:</span> ${data.status}</p>
                                <p><span class="label">Damage Description:</span> ${data.description}</p>
                                <img src="data:image/jpeg;base64,${data.image}" alt="Warranty History Image" style="max-width: 40%; height: auto; margin-top: 10px;"> <br><br>
                                <button onclick="MainPage()">Back to Airplane List</button>
                            </div>
                        `;
            container.innerHTML = historyContent;
        }

        //warranty event handler function 
        async function handleWarrantyEvent(id, name) {
            console.log("Warranty Event for:", id);
            const container = document.getElementById("main");
            const form = `
                        <h2>Warranty Event for Airplane ${name}</h2>
                        <form id="warrantyEventForm" enctype="multipart/form-data">
                            <label for="description">Description:</label><br>
                            <textarea id="description" placeholder="Description" required></textarea><br><br>
                            <label for="img">Select Image (Max 1MB):</label><br>
                            <input type="file" id="imgFile" name="image_file" accept="image/*" required><br><br>
                            <div style="display: flex; gap: 15px;">
                                <button type="submit">Submit Warranty Event</button> 
                                <button onclick="MainPage()">Back to Airplane List</button>
                            </div>
                        </form>
                        `;
            container.innerHTML = form;

            document.getElementById('warrantyEventForm').addEventListener('submit', async (e) => {
                e.preventDefault();

                //img file handling - Convert file to Base64 string
                const file = document.getElementById('imgFile').files[0];
                const reader = new FileReader();
                reader.readAsDataURL(file);
                reader.onload = async () => {
                    const base64Data = reader.result.split(',')[1];

                    //payload
                    const eventData = {
                        airplaneID: id,
                        technicianID: "1",
                        description: document.getElementById('description').value,
                        imageBytes: base64Data
                    };
                    try {
                        const response = await fetch('http://localhost:8080/warranty_event', {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify(eventData)
                        });

                        const result = await response.text();

                        const modal = document.getElementById('statusModal');
                        const msg = document.getElementById('modalMessage');
                        const btn = document.getElementById('closeBtn');

                        msg.textContent = result;
                        modal.showModal();
                        btn.onclick = () => {
                            modal.close();
                            container.innerHTML = "";
                            MainPage(); // Reset main container content and reload airplane list after submitting the warranty event
                        };

                    } catch (err) {
                        console.error("Fetch error:", err);
                    }
                }                        
               
            });

        }
    </script>


    <style>
        /*CSS for styling the airplane cards and grid layout*/
        .airplane-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 20px;
            padding: 20px;
        }

        .card {
            border: 1px solid #ddd;
            border-radius: 8px;
            padding: 15px;
            background-color: #f9f9f9;
            box-shadow: 2px 2px 5px rgba(0,0,0,0.1);
        }

            .card h3 {
                margin-top: 0;
                color: #0056b3;
            }

            .card p {
                margin: 5px 0;
                font-size: 0.9em;
            }

        .label {
            font-weight: bold;
            color: #555;
        }

        .card-actions {
            display: flex;
            flex-wrap: wrap; /* Allows wrapping on small screens */
            gap: 8px;
            margin-top: 15px;
            padding-top: 10px;
            border-top: 1px solid #eee; /* Light line to separate from data */
        }

        .action-link {
            background: none;
            border: none;
            padding: 0;
            color: #0056b3;
            font-size: 0.85em;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
        }

            .action-link:hover {
                text-decoration: underline;
                color: #003d80;
            }

            .action-link:not(:last-child)::after {
                content: "||";
                margin-left: 8px;
                color: #ccc; /* Lighter color for the bar so it's not distracting */
                cursor: default;
                text-decoration: none;
                display: inline-block;
            }
    </style>

</BODY>
</HTML>
